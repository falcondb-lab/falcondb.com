# PostgreSQL pgbench PoC — Server Configuration
#
# FAIRNESS DISCLOSURE:
#   - WAL is ENABLED (default)
#   - fsync = on (durability guaranteed)
#   - synchronous_commit = on (no async commit cheating)
#   - Single-node (no replication)
#   - Authentication: trust for local connections
#
# This configuration matches FalconDB's durability settings.
# No unsafe optimizations are applied.

# ── Connection ────────────────────────────────────────────────────────────
listen_addresses = '*'
port = 5432
max_connections = 200

# ── Memory ────────────────────────────────────────────────────────────────
shared_buffers = 256MB
work_mem = 4MB
maintenance_work_mem = 64MB
effective_cache_size = 512MB

# ── WAL / Durability ─────────────────────────────────────────────────────
wal_level = replica
fsync = on
synchronous_commit = on
wal_sync_method = fdatasync
full_page_writes = on
wal_buffers = 16MB
checkpoint_completion_target = 0.9
max_wal_size = 1GB

# ── Logging (minimal, for benchmark fairness) ────────────────────────────
logging_collector = off
log_min_messages = warning

# ── Autovacuum (enabled, default behavior) ────────────────────────────────
autovacuum = on
