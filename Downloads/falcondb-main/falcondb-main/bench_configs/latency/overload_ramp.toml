# FalconDB P2 — Overload Ramp Benchmark (Degradation Curve)
# Verifies predictable degradation: reject over degrade.

[workload]
duration_sec = 600
concurrent_connections = 200
ramp_step_sec = 120
table_count = 10
rows_per_table = 100000

[workload.mix]
select = 50
insert = 25
update = 20
delete = 5

[workload.ramp]
target_tps_steps = [100, 500, 1000, 2000, 5000]

[thresholds]
max_p99_multiplier = 2.0
max_cliff_ratio = 3.0
max_reject_rate = 0.50
