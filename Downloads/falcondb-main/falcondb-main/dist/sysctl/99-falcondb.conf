# /etc/sysctl.d/99-falcondb.conf
# FalconDB production sysctl tuning for Ubuntu 24.04 LTS
# See: docs/os/linux_ubuntu_24_04.md §6 Network Stack Optimization

# ── TCP Latency ──
net.ipv4.tcp_low_latency = 1

# ── Buffer Sizes (gRPC replication + cross-shard) ──
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 1048576 16777216
net.ipv4.tcp_wmem = 4096 1048576 16777216

# ── Connection Handling ──
net.ipv4.tcp_keepalive_time = 60
net.ipv4.tcp_keepalive_intvl = 10
net.ipv4.tcp_keepalive_probes = 6

# ── Backlog ──
net.core.somaxconn = 4096
net.ipv4.tcp_max_syn_backlog = 4096

# ── Congestion Control (BBR for WAL streaming) ──
net.ipv4.tcp_congestion_control = bbr
net.core.default_qdisc = fq

# ── Memory ──
vm.swappiness = 1
vm.overcommit_memory = 2
vm.overcommit_ratio = 80
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5
