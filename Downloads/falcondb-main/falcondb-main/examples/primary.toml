# FalconDB — Primary Node Configuration
# Start with: cargo run -p falcon_server -- -c examples/primary.toml

[server]
pg_listen_addr = "0.0.0.0:5433"
admin_listen_addr = "0.0.0.0:8080"
node_id = 1
max_connections = 1024
statement_timeout_ms = 0
idle_timeout_ms = 0

[storage]
memory_limit_bytes = 0
wal_enabled = true
data_dir = "./falcon_data_primary"
# LSM table durability: false = WAL guarantees recovery (faster bulk insert)
# true  = every LSM write is fsynced (extra durability, slower writes)
lsm_sync_writes = false

[wal]
group_commit = true
flush_interval_us = 1000
sync_mode = "fdatasync"
segment_size_bytes = 67108864

[ustm]
enabled = true
hot_capacity_bytes = 536870912       # 512 MB — MemTable + index internals
warm_capacity_bytes = 268435456      # 256 MB — SST page cache (LIRS-2)
lirs_lir_capacity = 4096             # Protected high-frequency pages
lirs_hir_capacity = 1024             # Eviction candidate pages
background_iops_limit = 500          # Max IOPS for compaction/GC
prefetch_iops_limit = 200            # Max IOPS for query-driven prefetch
prefetch_enabled = true              # Enable query-aware prefetcher
page_size = 8192                     # Default page size (8 KB)

[replication]
role = "primary"
grpc_listen_addr = "0.0.0.0:50051"
primary_endpoint = ""
max_records_per_chunk = 1000
poll_interval_ms = 100
max_backoff_ms = 30000
connect_timeout_ms = 5000
shard_count = 1
