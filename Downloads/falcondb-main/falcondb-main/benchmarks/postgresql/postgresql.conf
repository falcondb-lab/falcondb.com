# PostgreSQL Benchmark Configuration
# Tuned for fair comparison with FalconDB on same hardware

# Memory — match FalconDB's 2GB allocation
shared_buffers = 2GB
effective_cache_size = 4GB
work_mem = 64MB
maintenance_work_mem = 512MB

# WAL — match FalconDB's fdatasync mode
wal_sync_method = fdatasync
wal_buffers = 64MB
checkpoint_timeout = 5min
max_wal_size = 2GB

# Connections
max_connections = 100
listen_addresses = '127.0.0.1'
port = 5432

# Logging — minimal to avoid I/O overhead
log_min_duration_statement = -1
logging_collector = off

# Performance
random_page_cost = 1.1
effective_io_concurrency = 200
