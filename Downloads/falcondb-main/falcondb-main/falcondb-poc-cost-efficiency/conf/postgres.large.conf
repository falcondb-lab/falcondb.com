# ============================================================================
# FalconDB PoC #6 — Cost Efficiency: PostgreSQL Production-Sized Configuration
# ============================================================================
# Typical production PostgreSQL configuration for comparison.
# This is NOT an artificially weakened config — it represents standard
# best-practice settings for a production OLTP workload.
#
# Resource Envelope (typical production sizing):
#   - shared_buffers: 4 GB (standard 25% of 16 GB RAM)
#   - effective_cache_size: 12 GB
#   - Durability: FULL (fsync=on, synchronous_commit=on)
# ============================================================================

# — Connection Settings —
listen_addresses = '*'
port = 5432
max_connections = 200

# — Memory —
shared_buffers = '4GB'
effective_cache_size = '12GB'
work_mem = '64MB'
maintenance_work_mem = '512MB'

# — WAL / Durability (FULL — no shortcuts) —
wal_level = 'replica'
fsync = on
synchronous_commit = on
wal_buffers = '64MB'
checkpoint_completion_target = 0.9
max_wal_size = '2GB'
min_wal_size = '512MB'

# — Query Planner —
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# — Parallel Query —
max_worker_processes = 8
max_parallel_workers_per_gather = 4
max_parallel_workers = 8

# — Logging (minimal for benchmark fairness) —
logging_collector = on
log_directory = 'log'
log_min_duration_statement = 5000

# — Autovacuum —
autovacuum = on
autovacuum_max_workers = 3
