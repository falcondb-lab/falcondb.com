# ============================================================================
# FalconDB Configuration — Docker Container
# ============================================================================
#
# Mounted at /etc/falcondb/falcon.toml inside the container.
# Override with: docker run -v ./my-falcon.toml:/etc/falcondb/falcon.toml ...

config_version = 3

# ── Server ──────────────────────────────────────────────────────────────────

[server]
pg_listen_addr = "0.0.0.0:5443"
admin_listen_addr = "0.0.0.0:8080"
node_id = 1
max_connections = 1024
statement_timeout_ms = 0
idle_timeout_ms = 300000
shutdown_drain_timeout_secs = 30

[server.auth]
method = "trust"

[server.tls]
# cert_path = "/etc/falcondb/certs/server.crt"
# key_path  = "/etc/falcondb/certs/server.key"

# ── Storage ─────────────────────────────────────────────────────────────────

[storage]
data_dir = "/var/lib/falcondb"
wal_enabled = true
memory_limit_bytes = 0

# ── WAL ─────────────────────────────────────────────────────────────────────

[wal]
group_commit = true
flush_interval_us = 1000
sync_mode = "fdatasync"
segment_size_bytes = 67108864

# ── Replication ─────────────────────────────────────────────────────────────

[replication]
role = "standalone"
grpc_listen_addr = "0.0.0.0:50051"
primary_endpoint = "http://127.0.0.1:50051"

# ── GC ──────────────────────────────────────────────────────────────────────

[gc]
enabled = true
interval_ms = 1000
batch_size = 0
min_chain_length = 2
